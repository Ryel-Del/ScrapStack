<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrapStack | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <header class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-emerald-500 rounded flex items-center justify-center text-white font-bold">S</div>
            <span class="text-xl font-bold tracking-tight text-slate-800">Scrap<span class="text-emerald-500">Stack</span></span>
        </div>
        
        <nav class="hidden md:flex space-x-10 font-medium text-slate-600">
            <a href="#" class="text-emerald-500">Home</a>
            <a href="#" class="hover:text-emerald-500 transition">Marketplace</a>
            <a href="#" class="hover:text-emerald-500 transition">Our Impact</a>
        </nav>

        <div class="flex items-center space-x-4">
            <button class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-full text-sm font-semibold flex items-center">
                <span class="mr-1 text-lg leading-none">+</span> List Scrap
            </button>
            <div class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pt-16 pb-24 grid md:grid-cols-2 gap-12 items-center">
        
        <div class="space-y-8">
            <h1 class="text-6xl md:text-8xl font-extrabold leading-[1.1] tracking-tight text-slate-900">
                Your Broken<br>
                Tech is<br>
                <span class="text-emerald-500 italic">Smart Scrap.</span>
            </h1>
            
            <p class="text-xl text-slate-600 leading-relaxed max-w-lg">
                ScrapStack connects e-waste sellers with engineering students and DIYers. 
                Don't throw it away—part it out and fuel local innovation.
            </p>

            <div class="flex flex-wrap gap-4 pt-4">
                <button class="bg-[#2d2d2d] hover:bg-black text-white px-8 py-4 rounded-xl font-bold text-lg transition shadow-lg">
                    Browse Marketplace
                </button>
                <button class="border-2 border-emerald-500 text-emerald-600 hover:bg-emerald-50 transition px-8 py-4 rounded-xl font-bold text-lg">
                    List Your Scrap +
                </button>
            </div>

            <div class="flex items-center space-x-4 pt-6 text-slate-400">
                <div class="flex -space-x-2">
                    <div class="w-8 h-8 rounded-full border-2 border-white bg-slate-200"></div>
                    <div class="w-8 h-8 rounded-full border-2 border-white bg-slate-300"></div>
                    <div class="w-8 h-8 rounded-full border-2 border-white bg-slate-400"></div>
                    <div class="w-8 h-8 rounded-full border-2 border-white bg-slate-500 flex items-center justify-center text-[10px] text-white font-bold">+</div>
                </div>
                <span class="text-sm font-medium">Trusted by Thousands of Innovators Worldwide</span>
            </div>
        </div>

        <div class="relative">
            <div class="aspect-[4/3] rounded-3xl overflow-hidden shadow-2xl border-4 border-slate-50">
                <img src="https://images.unsplash.com/photo-1555664424-778a1e5e1b48?q=80&w=2070&auto=format&fit=crop" 
                     alt="Scrap electronics being sorted" 
                     class="w-full h-full object-cover">
            </div>
        </div>
    </main>

</body>
</html>
